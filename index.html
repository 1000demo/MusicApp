<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');

        html,
        body {
            font-family: "Inter", sans-serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;

        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1a1035, #090616);
            color: #fff;
        }

        .outer-sec {
            height: 100vh;
            display: flex;
            align-items: center;
        }

        /* Main Card */
        .music-conatiner {
            width: 300px;
            padding: 25px 20px;
            border-radius: 30px;
            text-align: center;
            background: linear-gradient(180deg, #1a1035, #0c0820);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        /* 🎵 Title */
        .title {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 8s linear infinite;
            margin: 0;
        }

        /* Smooth left scroll */
        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-100%);
            }
        }

        .artist {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 35px;
        }

        /* 🎧 Vinyl Style Image */
        .img-conatiner {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .img-conatiner img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;

            /* Vinyl rings effect */
            box-shadow:
                0 0 0 8px rgba(255, 255, 255, 0.02),
                0 0 0 16px rgba(255, 255, 255, 0.02),
                0 0 0 24px rgba(255, 255, 255, 0.02),
                0 0 40px rgba(168, 85, 247, 0.6);
        }

        /* Glow center dot effect */
        .img-conatiner img::after {
            content: '';
        }

        /* Controls */
        .btn-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            margin-top: 20px;
        }

        /* Buttons */
        .btn-section i {
            font-size: 18px;
            color: #bbb;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-section i:hover {
            color: #fff;
            transform: scale(1.2);
        }

        /* Play button (purple glow like image) */
        #play {
            font-size: 22px;
            background: linear-gradient(135deg, #9333ea, #ec4899);
            color: #fff;
            padding: 14px;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.8);
        }

        /* Rotation */
        @keyframes rotateAlbum {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .rotateImg {
            animation: rotateAlbum 6s linear infinite;
        }

        h1 {
            font-size: 36px;
            text-align: center;
            margin-top: 40px;
            background: linear-gradient(90deg, #f851d9, #64116e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* text-shadow: 0 0 10px rgb(24 15 50), 0 0 20px rgb(19 12 40); */
            /* animation: glow 2s infinite alternate; */
        }

        /* Animation */
        @keyframes glow {
            from {
                text-shadow: 0 0 10px rgba(255, 106, 0, 0.6),
                    0 0 20px rgba(238, 9, 121, 0.5);
            }

            to {
                text-shadow: 0 0 20px rgba(255, 106, 0, 1),
                    0 0 30px rgba(238, 9, 121, 0.9);
            }
        }
    </style>
</head>

<body>

            <div class="music-conatiner">

                <!-- <h4 class="movieName">The Loyalist</h4> -->

                <div class="music-controls"></div>

                <div class="btn-section">

        //JS CODE
        const music = document.querySelector('audio');
        const play = document.querySelector('#play');
        const myImage = document.querySelector('.test');

        const title = document.querySelector('.title');
        //const movieName = document.querySelector('.movieName');

        const artist = document.querySelector('.artist');
        const next = document.querySelector('#next');
        const prev = document.querySelector('#prev');



        let isPlaying = false;
        //Play
        let playMusic = () => {
            isPlaying = true;
            music.play();
            play.classList.replace('fa-play', 'fa-pause');
            myImage.classList.add('rotateImg');
        };

        //Pause
        let pauseMusic = () => {
            isPlaying = false;
            music.pause();
            play.classList.replace('fa-pause', 'fa-play');
            myImage.classList.remove('rotateImg');
        };

        play.addEventListener('click', () => {
            // if (isPlaying) {
            //     pauseMusic();
            // }
            // else {
            //     playMusic();
            // }

            isPlaying ? pauseMusic() : playMusic()
        });

        let songIndex = 0; //start song Array Number

        const loadSong = (songs) => {
            //movieName.textContent = songs.name;
            title.textContent = songs.title;
            artist.textContent = songs.artist;
            music.src = "songs/" + songs.name + ".mp3";
            myImage.src = "images/" + songs.name + ".jpg";
        }

        //loadSong(songs[songIndex]); //load song by array index [0]

        const nextSong = () => {
            songIndex = (songIndex + 1) % songs.length;
            loadSong(songs[songIndex]); //load song by array index [0]
            playMusic();
        }

        const prevSong = () => {
            songIndex = (songIndex - 1 + songs.length) % songs.length;
            loadSong(songs[songIndex]); //load song by array index [0]
            playMusic();
        }

        next.addEventListener('click', nextSong);
        prev.addEventListener('click', prevSong);


    </script>
